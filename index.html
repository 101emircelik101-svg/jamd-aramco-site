<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAM'D-ARAMCO Restaurant</title>
    <style>
        :root {
            --bg-color: #0b111a;
            --card-bg: #151d29;
            --primary-accent: #10ac84; /* Green from the menu */
            --secondary-accent: #48dbfb; /* Blue from the menu */
            --text-main: #f1f2f6;
            --text-muted: #a4b0be;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px;
            background-color: var(--card-bg);
            border-bottom: 3px solid var(--primary-accent);
        }

        h1 {
            margin: 0;
            font-size: 3em;
            letter-spacing: 2px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .rating {
            color: #f1c40f;
            font-size: 1.2em;
            margin: 10px 0;
        }

        .quick-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            color: var(--text-muted);
            font-size: 0.9em;
            flex-wrap: wrap;
        }

        .quick-info span {
            background-color: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 15px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        section {
            background-color: var(--card-bg);
            margin-bottom: 30px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        h2 {
            color: var(--primary-accent);
            border-bottom: 2px solid var(--primary-accent);
            padding-bottom: 10px;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            color: var(--text-muted);
        }

        .info-item strong {
            color: var(--text-main);
            display: block;
        }

        /* Menu Styles */
        .menu-category {
            margin-bottom: 30px;
        }
        
        .menu-category-title {
            color: var(--primary-accent);
            text-align: right;
            font-size: 1.5em;
            margin-bottom: 15px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
        }
